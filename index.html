<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#ffdde1,#ffc3a0);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:90%;
    max-width:600px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:35px;
    text-align:center;
    color:white;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}

h1{
    font-size:42px;
    margin-bottom:15px;
}

#typing{
    min-height:80px;
    font-size:22px;
    line-height:1.6;
}

button{
    margin-top:25px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4d6d;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

#message{
    display:none;
    margin-top:25px;
    font-size:22px;
    animation:fade 1s;
}

@keyframes fade{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

.heart{
    position:absolute;
    color:white;
    font-size:20px;
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(.5);
        opacity:0;
    }
    20%{opacity:1;}
    to{
        transform:translateY(-100px) scale(1.5);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>❤️ Hey Beautiful ❤️</h1>

    <p id="typing"></p>

    <button onclick="showMessage()">Open My Heart 💖</button>

    <div id="message">
        🌹<br><br>
        You make my ordinary days extraordinary.<br><br>

        Your smile is my favorite view.<br>
        Your happiness is my favorite dream.<br>
        Your love is my greatest gift.<br><br>

        Thank you for being you. ❤️<br><br>

        <h2>I Love You Forever 💕</h2>
    </div>
</div>

<script>
const text =
"Every heartbeat reminds me of you. Every smile I wear has a little bit of you in it. Thank you for filling my life with love, laughter, and endless happiness. ❤️";

let i=0;

function typeWriter(){
    if(i<text.length){
        document.getElementById("typing").innerHTML+=text.charAt(i);
        i++;
        setTimeout(typeWriter,45);
    }
}
typeWriter();

function showMessage(){
    document.getElementById("message").style.display="block";

    for(let i=0;i<40;i++){
        createHeart();
    }
}

function createHeart(){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";

    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(3+Math.random()*4)+"s";
    heart.style.fontSize=(15+Math.random()*30)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },7000);
}
</script>

</body>
</html>
